name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: make release
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            dist/*

  # Publish the OCI image (ghcr.io/crenelhq/crenel) for the same tag. A sibling
  # job so a registry hiccup never blocks the binary release above.
  # One-time org setup: after the FIRST push, make the package public in the
  # ghcr package settings (packages default to private).
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Smoke test BEFORE push: build the host-arch image locally and prove the
      # binary answers `crenel version` with the stamped tag.
      - name: Build smoke-test image (host arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: crenel:smoke
          build-args: |
            VERSION=${{ github.ref_name }}
      - name: Smoke test — crenel version
        run: |
          out="$(docker run --rm crenel:smoke version)"
          echo "crenel version -> $out"
          echo "$out" | grep -F "${{ github.ref_name }}"
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/crenelhq/crenel:${{ github.ref_name }}
            ghcr.io/crenelhq/crenel:latest
          build-args: |
            VERSION=${{ github.ref_name }}
