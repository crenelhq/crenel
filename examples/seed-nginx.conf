# operator-owned nginx config — crenel only manages its own marked blocks

upstream authelia_backend {
    server 10.0.0.9:9091;
}

# unmanaged vhost (Authelia) — crenel must preserve this verbatim
server {
    listen 443 ssl;
    server_name auth.example.com;
    location / {
        proxy_pass http://authelia_backend;
    }
}
